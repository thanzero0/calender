<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender Minimalis</title>
    <meta name="description" content="Kalender digital minimalis yang modern, elegan, dan responsif.">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calendar-container" id="calendar">
        <div class="calendar-header">
            <div class="month-year-wrapper">
                <h1 class="month-year" id="current-month">Januari 2026</h1>
                <button class="jump-btn" id="jump-btn" aria-label="Jump to month/year">
                    <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"></path></svg>
                </button>
            </div>

            <div class="nav-buttons">
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
                    <!-- Sun Icon (for Dark Mode) -->
                    <svg class="sun-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <!-- Moon Icon (for Light Mode) -->
                    <svg class="moon-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
                <button class="nav-btn" id="prev-btn" aria-label="Previous Month">
                    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <button class="nav-btn" id="next-btn" aria-label="Next Month">
                    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
            </div>
        </div>
        <div class="calendar-grid" id="calendar-grid">
            <!-- Grid content -->
        </div>
        
        <!-- Jump Selection Overlay -->
        <div class="jump-overlay" id="jump-overlay">
            <div class="jump-header">
                <h3>Pilih Bulan & Tahun</h3>
                <button id="close-jump" class="close-btn">&times;</button>
            </div>
            <div class="jump-body">
                <div class="jump-group">
                    <label for="month-select">Bulan</label>
                    <select id="month-select"></select>
                </div>
                <div class="jump-group">
                    <label for="year-select">Tahun</label>
                    <select id="year-select"></select>
                </div>
                <div class="jump-actions">
                    <button id="today-jump" class="today-btn">Hari Ini</button>
                    <button id="apply-jump" class="apply-btn">Tampilkan</button>
                </div>
            </div>
        </div>
    </div>

    <div class="cursor-glow" id="cursor-glow"></div>
    <script src="script.js"></script>
</body>
</html>
