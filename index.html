<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calender</title>
    <meta name="description" content="Kalender digital minimalis yang modern, elegan, dan responsif.">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="cursor-glow" id="cursor-glow"></div>
    <div class="floating-controls">
        <div class="fab-group" id="fabGroup">
            <div class="fab-options">
                <button class="fab-btn jump-fab" onclick="toggleJumpOverlay()" aria-label="Jump to Date">⟲</button>
                
                <div class="size-fab-container">
                    <button class="fab-btn size-fab" onclick="toggleSizeMenu()" aria-label="Adjust Size">⤢</button>
                    <div class="size-menu" id="sizeMenu">
                        <button class="size-opt" onclick="setSize('small')">Small</button>
                        <button class="size-opt active" onclick="setSize('medium')">Medium</button>
                        <button class="size-opt" onclick="setSize('large')">Large</button>
                        <button class="size-opt" id="customSizeOpt" onclick="toggleCustomSize()">Custom</button>
                    </div>

                    <!-- Custom Size Panel -->
                    <div class="custom-size-panel" id="customSizePanel">
                        <div class="custom-theme-header">
                            <span>Ukuran Custom</span>
                            <button onclick="toggleCustomSize()">×</button>
                        </div>
                        <div class="custom-theme-body">
                            <div class="color-row">
                                <label>Lebar</label>
                                <input type="range" id="size-width" min="300" max="800" value="450" oninput="applyCustomSize()">
                            </div>
                            <div class="color-row">
                                <label>Skala</label>
                                <input type="range" id="size-scale" min="0.5" max="1.5" step="0.05" value="1" oninput="applyCustomSize()">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="theme-fab-container">
                    <button class="fab-btn theme-fab" onclick="toggleThemeMenu()" aria-label="Switch Theme">◐</button>
                    <div class="theme-menu" id="themeMenu">
                        <button class="theme-opt active" onclick="setTheme('dark')">Dark</button>
                        <button class="theme-opt" onclick="setTheme('light')">Light</button>
                        <button class="theme-opt" onclick="setTheme('neon')">Neon</button>
                        <button class="theme-opt" onclick="setTheme('sunset')">Sunset</button>
                        <button class="theme-opt" onclick="setTheme('cyberpunk')">Cyber</button>
                        <button class="theme-opt" onclick="setTheme('forest')">Forest</button>
                        <button class="theme-opt" onclick="setTheme('ocean')">Ocean</button>
                        <button class="theme-opt" id="customThemeOpt" onclick="setTheme('custom')">Custom</button>
                    </div>

                    <!-- Custom Theme Editor -->
                    <div class="custom-theme-panel" id="customThemePanel">
                        <div class="custom-theme-header">
                            <span>Editor Warna</span>
                            <button onclick="toggleCustomEditor()">×</button>
                        </div>
                        <div class="custom-theme-body">
                            <div class="color-row"><label>Background</label><input type="color" id="color-bg" oninput="applyCustomTheme()"></div>
                            <div class="color-row"><label>Surface</label><input type="color" id="color-surface" oninput="applyCustomTheme()"></div>
                            <div class="color-row"><label>Text</label><input type="color" id="color-text" oninput="applyCustomTheme()"></div>
                            <div class="color-row"><label>Accent</label><input type="color" id="color-accent" oninput="applyCustomTheme()"></div>
                            <button class="save-theme-btn" onclick="saveCustomTheme()">Save Theme</button>
                        </div>
                    </div>
                </div>
            </div>
            <button class="fab-btn main-fab" onclick="toggleMainFab()" aria-label="Menu">☰</button>
        </div>
    </div>

    <div class="calendar-container" id="calendar">
        <div class="calendar-header">
            <div class="nav-buttons">
                <button class="nav-btn" id="prev-btn" aria-label="Previous Month">
                    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <button class="nav-btn" id="next-btn" aria-label="Next Month">
                    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
            </div>

            <div class="month-year-wrapper">
                <h1 class="month-year" id="current-month">Januari 2026</h1>
            </div>
        </div>
        <div class="calendar-grid" id="calendar-grid">
            <!-- Grid content -->
        </div>
        
        <!-- Custom Premium Jump Selection Popup -->
        <div class="jump-overlay" id="jump-overlay">
            <div class="jump-header">
                <button id="close-jump" class="close-btn">&times;</button>
            </div>
            
            <div class="jump-body">
                <div class="month-selector-grid" id="month-picker">
                    <!-- Months will be injected here -->
                </div>
                
                <div class="year-selector-scroller" id="year-picker">
                    <!-- Years will be injected here -->
                </div>

                <div class="jump-actions">
                    <button id="today-jump" class="today-btn">Hari Ini</button>
                    <button id="apply-jump" class="apply-btn">Konfirmasi</button>
                </div>
            </div>
        </div>

    </div>

    <div class="cursor-glow" id="cursor-glow"></div>
    <script src="js/script.js"></script>
</body>
</html>
